name: Mobile release APK

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build_release_apk.yml
      - android/**
      - app/**
      - assets/**
      - components/**
      - constants/**
      - hooks/**
      - lib/**
      - providers/**
      - services/**
      - package.json
      - package-lock.json
      - app.json
      - tsconfig.json
      - eslint.config.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
    defaults:
      run:
        working-directory: /home/runner/work/myapp-mobile/myapp-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: /home/runner/work/myapp-mobile/myapp-mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        run: npm run lint

      - name: Prepare Android SDK location
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE="$MYAPP_UPLOAD_STORE_FILE" \
            -PMYAPP_UPLOAD_STORE_PASSWORD="$MYAPP_UPLOAD_STORE_PASSWORD" \
            -PMYAPP_UPLOAD_KEY_ALIAS="$MYAPP_UPLOAD_KEY_ALIAS" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="$MYAPP_UPLOAD_KEY_PASSWORD"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: myapp-mobile-release-apk
          path: /home/runner/work/myapp-mobile/myapp-mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Compute release metadata
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TAG="mobile-v${APP_VERSION}+build.${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="myapp-mobile v${APP_VERSION} build ${GITHUB_RUN_NUMBER}"
          {
            echo "APP_VERSION=$APP_VERSION"
            echo "SHORT_SHA=$SHORT_SHA"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_NAME=$RELEASE_NAME"
          } >> "$GITHUB_ENV"

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          generate_release_notes: true
          files: /home/runner/work/myapp-mobile/myapp-mobile/android/app/build/outputs/apk/release/*.apk
          body: |
            Automated Android release APK build for `myapp-mobile`.

            Version: `${{ env.APP_VERSION }}`
            Commit: `${{ env.SHORT_SHA }}`
            Workflow: `${{ github.workflow }}`
